services:
  contractbpf:
    build:
      context: .
      dockerfile: Dockerfile
    image: contractbpf-ubuntu:24.04
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      CARGO_HOME: /cargo
      CONTRACTBPF_LINUX_DIR: /workspace/build/linux
      CONTRACTBPF_REMOTE: ${CONTRACTBPF_REMOTE:-}
      CONTRACTBPF_REMOTE_DIR: ${CONTRACTBPF_REMOTE_DIR:-}
      CONTRACTBPF_REMOTE_SKIP_BUILD: ${CONTRACTBPF_REMOTE_SKIP_BUILD:-}
      CONTRACTBPF_RSYNC: ${CONTRACTBPF_RSYNC:-}
      CONTRACTBPF_SSH: ${CONTRACTBPF_SSH:-}
      CONTRACTBPF_SSH_OPTIONS: ${CONTRACTBPF_SSH_OPTIONS:-}
      RUST_BACKTRACE: "1"
    volumes:
      - .:/workspace
      - build-cache:/workspace/build
      - cargo-cache:/cargo
    command: /bin/bash

volumes:
  build-cache:
  cargo-cache:
