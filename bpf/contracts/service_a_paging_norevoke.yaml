policy: phase_paging_A
subsystem: mm
scope:
  type: memcg
  id: service-A
effects:
  - name: demote_page
    budget:
      max_pages_per_epoch: 1000000000
      max_refault_ratio: 1000000.0
      max_fault_latency_us: 1000000000
    degrade:
      level1: throttle_demote
      level2: revoke_demote
      level3: kernel_default_reclaim
  - name: reclaim_hint
    budget:
      max_hints_per_epoch: 1000000000
    degrade:
      level1: ignore_hint
      level2: revoke_reclaim_hint
      level3: kernel_default_reclaim
