policy: aggressive_sched_B
subsystem: sched_ext
scope:
  type: cgroup
  id: service-B
effects:
  - name: boost_task
    budget:
      max_boosts_per_epoch: 12000
      max_queue_delay_us: 7000
    degrade:
      level1: throttle_boost
      level2: revoke_boost
      level3: disable_scheduler
  - name: dispatch_task
    budget:
      max_dispatch_failures_per_epoch: 8
      max_starvation_window_us: 20000
    degrade:
      level1: drain_dsq
      level2: revoke_dispatch_modification
      level3: disable_scheduler
