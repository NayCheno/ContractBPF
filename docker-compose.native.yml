services:
  contractbpf:
    privileged: true
    pid: host
    cgroup: host
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_NICE
      - IPC_LOCK
      - BPF
      - PERFMON
    environment:
      CONTRACTBPF_CGROUP_ROOT: /sys/fs/cgroup
      CONTRACTBPF_DEBUGFS: /sys/kernel/debug/contractbpf
      CONTRACTBPF_DEVICE: /dev/contractbpf
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /lib/modules:/lib/modules:ro
